newapi:
  response:
    force_plain_text: true
    strip_markdown_chars: true
  payment:
    auto_require_method_selection_when_multiple: true
    auto_fallback_method_when_info_unavailable: alipay
    show_amount_unit_hint: true
    show_topup_command_hints: false
  privacy_guard:
    only_when_password_like: false
    recall_message: true
    notify_private: true
  enabled: true
